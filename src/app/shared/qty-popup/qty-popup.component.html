<div
  class="blur-wrapper"
  (click)="UiService.closeQtyPopup()"
  [class.active]="UiService.isQtyPopupOpen()"
>
  <div
    class="popup-window"
    (click)="$event.stopPropagation()"
    [class.active]="UiService.isQtyPopupOpen()"
  >
    <h1 class="product-name">
      {{ cartService.selectedItem()?.product?.nameKey | translate }}
    </h1>
    <p>{{ "GENERAL.QUANTITY" | translate }}:</p>
    <div class="qty-button">
      <button
        class="qty-selector"
        [class.clicked]="clickedMinus"
        (click)="cartService.decreaseQtyOfItem(); onClick('minus')"
      >
        <i class="fa-solid fa-minus"></i>
      </button>
      <span class="qty-counter">{{
        cartService.selectedItem()?.quantity
      }}</span>
      <button
        class="qty-selector"
        [class.clicked]="clickedPlus"
        (click)="cartService.increaseQtyOfItem(); onClick('plus')"
      >
        <i class="fa-solid fa-plus"></i>
      </button>
    </div>
    <p>
      {{ "GENERAL.PRICE" | translate }}:
      <span
        >{{
          cartService.getTotalCartItemPrice(cartService.selectedItem())
            | number : "1.2-2"
        }},-</span
      >
    </p>
    <div>
      <button
        class="delete-button"
        [class.for-sure]="UiService.isRemoveConfirmationVisible()"
        (click)="UiService.askToRemoveFromCart()"
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          fill="none"
          viewBox="0 0 24 24"
          stroke-width="1.5"
          stroke="currentColor"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="m14.74 9-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 0 1-2.244 2.077H8.084a2.25 2.25 0 0 1-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 0 0-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 0 1 3.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 0 0-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 0 0-7.5 0"
          />
        </svg>
      </button>
      <button
        class="decline-button"
        [class.visible]="UiService.isRemoveConfirmationVisible()"
        (click)="UiService.stopRemovingFromCart()"
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          fill="none"
          viewBox="0 0 24 24"
          stroke-width="1.5"
          stroke="currentColor"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M6 18 18 6M6 6l12 12"
          />
        </svg>
      </button>
      <button
        class="confirm-button"
        [class.visible]="UiService.isRemoveConfirmationVisible()"
        (click)="cartService.removeFromCart()"
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          fill="none"
          viewBox="0 0 24 24"
          stroke-width="1.5"
          stroke="currentColor"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="m4.5 12.75 6 6 9-13.5"
          />
        </svg>
      </button>
    </div>
  </div>
</div>
